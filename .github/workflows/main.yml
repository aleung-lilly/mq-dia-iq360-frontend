#/.github/workflows/cfnlint.yml
#https://github.com/marketplace/actions/cfn-lint-action
#https://github.com/aws-cloudformation/cfn-lint#basic-usage
# Add --non-zero-exit-code in cfn-lint that can choose the Error Code after action run.
# Refer: https://github.com/aws-cloudformation/cfn-lint?tab=readme-ov-file#exit-codes
name: Cfn-lint Check

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  cloudformation-linter:
    name: cfn-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Cloud Formation Linter with Latest Version
        uses: scottbrenner/cfn-lint-action@v2

      - name: Print the Cloud Formation Linter Version & run Linter.
        run: |
          cfn-lint --version
          cfn-lint -t ./**/*.yml ./**/*.yaml --non-zero-exit-code error
